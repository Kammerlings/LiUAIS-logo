<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Sigmoid Logo</title>
  <style>
    :root {
      --bg: #00B9E7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: block;
      background: var(--bg);
      overflow: auto;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 1rem;
    }

    .rows {
      display: grid;
      gap: 1rem;
      width: min(96vw, 1400px);
      margin: 0 auto;
    }

    .comparison-row {
      --row-bg: #00B9E7;
      --panel-bg: transparent;
      --panel-border: rgba(255, 255, 255, 0.45);
      --text: #ffffff;
      --logo-filter: brightness(0) invert(1);

      background: var(--row-bg);
      border-radius: 14px;
      padding: 0.25rem;
    }

    .comparison {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 1.25rem;
      padding: 1rem;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 1rem;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 0.75rem;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      position: relative;
    }

    .label {
      margin: 0;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
    }

    .logo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center;
      filter: var(--logo-filter);
      position: relative;
      z-index: 1;
    }

    .logo-raw {
      filter: none;
    }

    .logo-png {
      transform: scale(1);
      transform-origin: center;
    }

    .logo-6th {
      transform: translateY(-15%) scale(1.6);
      transform-origin: center;
    }

    .logo-first {
      transform: translateY(-6%);
      transform-origin: center;
    }

    .logo-last3 {
        transform: translateY(-15%) scale(1.7);
      transform-origin: center;
    }

    .theme-black {
      --row-bg: #000000;
      --panel-bg: transparent;
      --panel-border: rgba(255, 255, 255, 0.35);
      --text: #ffffff;
      --logo-filter: brightness(0) invert(1);
    }

    .theme-white {
      --row-bg: #ffffff;
      --panel-bg: transparent;
      --panel-border: rgba(0, 0, 0, 0.28);
      --text: #000000;
      --logo-filter: brightness(0);
    }

    .theme-white-blue {
      --row-bg: #ffffff;
      --panel-bg: transparent;
      --panel-border: rgba(0, 185, 231, 0.45);
      --text: #007da5;
      --logo-filter: none;
    }

    /* Preview area */
    .preview-area {
      border-radius: 14px;
      padding: 1.5rem 2.5rem;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 160px;
      transition: background 0.2s ease;
    }

    .preview-inner {
      display: none;
      align-items: center;
      gap: 0;
    }

    .preview-inner.visible {
      display: flex;
    }

    .preview-logo-wrap {
      height: 90px;
      width: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    #preview-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    #preview-text {
      height: 90px;
      width: auto;
      display: block;
    }

    .preview-placeholder {
      color: rgba(0, 0, 0, 0.3);
      font-size: 1rem;
      font-style: italic;
      margin: 0;
    }

    #preview-text.text-white path { fill: white; }

  </style>
</head>

          <p class="label">5</p>
          <img class="logo logo-raw logo-png logo-last3" src="Fattest-1.png" alt="Fattest logo blue on white" />
        </article>
        <article class="panel">
          <p class="label">6</p>
          <img class="logo logo-raw logo-6th" src="Fattest_blue_on_white.svg" alt="Fattest SVG logo blue on white" />
        </article>
        <article class="panel">
          <p class="label">7</p>
          <img class="logo logo-raw logo-png logo-last3" src="Original3.png" alt="Original logo blue on white" />
        </article>
      </div>
    </section>

  </main>

  <script>
    const previewArea = document.getElementById('preview-area');
    const previewInner = document.getElementById('preview-inner');
    const previewLogo = document.getElementById('preview-logo');
    const previewText = document.getElementById('preview-text');
    const previewPlaceholder = document.getElementById('preview-placeholder');

    document.querySelectorAll('.panel').forEach(panel => {
      const img = panel.querySelector('img');
      if (!img) return;

      panel.addEventListener('mouseenter', () => {
        const row = panel.closest('.comparison-row');
        const rowStyle = getComputedStyle(row);
        const rowBg = rowStyle.getPropertyValue('--row-bg').trim().toLowerCase();
        const logoFilter = img.classList.contains('logo-raw')
          ? 'none'
          : rowStyle.getPropertyValue('--logo-filter').trim();

        // Scale logos that have extra whitespace (matching panel CSS transforms)
        let scale = 1;
        if (img.classList.contains('logo-last3')) scale = 2.2;
        else if (img.classList.contains('logo-6th')) scale = 2.2;

        previewArea.style.background = rowStyle.getPropertyValue('--row-bg').trim();
        previewLogo.src = img.src;
        previewLogo.style.filter = logoFilter;
        previewLogo.style.transform = scale !== 1 ? `scale(${scale})` : '';

        // Flip SVG text to white on dark backgrounds
        if (rowBg === '#000000' || rowBg === '#00b9e7') {
          previewText.classList.add('text-white');
        } else {
          previewText.classList.remove('text-white');
        }

        previewInner.classList.add('visible');
        previewPlaceholder.style.display = 'none';
      });
    });
  </script>
</body>
</html>
